- type: entity
  parent: STAnomalyBase
  id: STAnomalyDebug
  suffix: ST, DEBUG, Anomaly
  components:
    - type: TriggerOnCollide
      fixtureID: fix1
    - type: WhitelistTriggerCondition
      userBlacklist:
        components:
        - Projectile
    - type: STAnomaly
      state: Idle
      states:
        Idle:
          - group: WeightSmall
            state: ActiveSmall
          - group: WeightNormal
            state: ActiveNormal
        ActiveNormal:
          - group: TimeDelayActive
            state: Idle
        ActiveSmall:
          - group: TimeDelayActive
            state: Idle
    - type: STAnomalyEffectThrow
      options:
        StateActiveNormal:
          range: 0.5
          distance: 10
          force: 20
          type: FromAnomaly
    - type: Sprite
      sprite: Effects/optionsvisualizertest.rsi
      state: none
