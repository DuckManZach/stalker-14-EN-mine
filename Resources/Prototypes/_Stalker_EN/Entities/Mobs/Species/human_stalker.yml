- type: entity
  save: false
  parent:
  - MobBloodstream
  - MobFlammable
  - MobFirePat
  - BaseMobSpecies
  id: BaseMobSpeciesOrganic
  abstract: true
  components:
  - type: PassiveDamage # Slight passive regen. Assuming one damage type, comes out to about 4 damage a minute.
    allowedStates:
    - Alive
    damageCap: 20
    damage:
      types:
        Heat: -0.07
      groups:
        Brute: -0.07
  - type: Blindable
  # Other
  - type: Temperature
    heatDamageThreshold: 325
    coldDamageThreshold: 260
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      293: 0.9
      280: 0.8
      260: 0.7
  - type: ThermalRegulator
    metabolismHeat: 800
    radiatedHeat: 100
    implicitHeatRegulation: 500
    sweatHeatRegulation: 2000
    shiveringHeatRegulation: 2000
    normalBodyTemperature: 310.15
    thermalRegulationTemperatureThreshold: 2
  - type: Perishable
  - type: Butcherable
    butcheringType: Spike # TODO human.
    spawned:
    - id: FoodMeat
      amount: 5
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: FireVisuals
    alternateState: Standing
  - type: StunVisuals
    # stalker-changes-start
  - type: Inventory
    templateId: STMain
  - type: PsyonicsShieldVisuals
    sprite: _Stalker/Effects/psyonic_shield.rsi
    state: Standing
  - type: PsyonicsMeditationVisuals
    sprite: _Stalker/Effects/psyonic_meditation.rsi
    state: base
  - type: PsyonicsLightVisuals
    sprite: _Stalker/Effects/psyonic_light.rsi
    state: base
  - type: Stamina
    decay: 14
    cooldown: 5
    critThreshold: 200
    stunModifierThresholds:
      0: 1.0
  - type: STWeight
    self: 70
  - type: StaminaActive
  - type: StaminaDecayModifier
  - type: StaminaCritThresholdModifier
  - type: RespawnOnDeath
  - type: ApproachEmitter # ST14-EN: removed params
  - type: BlowoutTarget
  - type: STEvasion
    evasion: 0.01
  - type: STCPR
    # stalker-changes-end
